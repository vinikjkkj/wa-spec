name: daily

on:
    schedule:
        - cron: '17 3 * * *'
    workflow_dispatch:
        inputs:
            publish:
                description: 'Publish updated packages to npm (uses trusted publishing — no token needed)'
                required: false
                default: 'false'

permissions:
    contents: write
    # Required for npm trusted publishing (OIDC). The workflow obtains a
    # short-lived token from GitHub's OIDC provider that npm verifies
    # against the package's configured trusted-publisher rules.
    id-token: write

concurrency:
    group: daily
    cancel-in-progress: false

jobs:
    extract:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Upgrade npm (trusted publishing needs >= 11.5.1)
              run: npm install -g npm@latest

            - name: Install Chrome deps (puppeteer-real-browser)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 \
                      libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 \
                      libdrm2 libgbm1 libglib2.0-0 libnspr4 libnss3 libpango-1.0-0 \
                      libx11-6 libxcb1 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
                      libxkbcommon0 libxrandr2 xdg-utils libu2f-udev libvulkan1 xvfb

            - name: Install
              run: npm install

            - name: Fetch raw bundles
              run: xvfb-run --auto-servernum -- npm run fetch

            - name: Extract mex bindings
              run: npm run extract:mex

            - name: Extract proto SDL + compile bindings
              run: |
                  npm run extract:proto
                  npm run compile:proto

            - name: Extract appstate schemas
              run: npm run extract:appstate

            - name: Extract XML stanza schemas
              run: npm run extract:xml

            - name: Extract WAM (analytics/metrics) schemas
              run: npm run extract:wam

            - name: Detect changes + bump versions
              id: diff
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  WA_VERSION=$(node -e "const j=require('./dump/manifest.json'); console.log(j.waVersion ?? 'unknown')")
                  SHA=$(git rev-parse --short HEAD)
                  NEW_VERSION="${WA_VERSION}-${SHA}"
                  echo "wa-version=$WA_VERSION" >> "$GITHUB_OUTPUT"
                  echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

                  # Stage just the generated artifacts to decide if anything changed.
                  git add packages/mex/index.json packages/mex/index.js packages/mex/index.d.ts \
                          packages/proto/WAProto.proto packages/proto/dist \
                          packages/appstate/index.json packages/appstate/index.js packages/appstate/index.d.ts \
                          packages/xml/index.json packages/xml/index.js packages/xml/index.d.ts \
                          packages/wam/index.json packages/wam/index.js packages/wam/index.d.ts || true
                  if git diff --staged --quiet; then
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
                  echo "changed=true" >> "$GITHUB_OUTPUT"

                  # Bump versions BEFORE the commit so package.json + lockfile +
                  # artifacts all land in the same atomic change.
                  npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version \
                      --workspace @vinikjkkj/wa-mex \
                      --workspace @vinikjkkj/wa-proto \
                      --workspace @vinikjkkj/wa-appstate \
                      --workspace @vinikjkkj/wa-xml \
                      --workspace @vinikjkkj/wa-wam
                  git add packages/mex/package.json packages/proto/package.json packages/appstate/package.json packages/xml/package.json packages/wam/package.json package-lock.json

                  git commit -m "chore: extract WA Web ${WA_VERSION} (${NEW_VERSION})"
                  git push

            - name: Publish to npm (trusted publishing — OIDC, no token)
              if: steps.diff.outputs.changed == 'true' && (github.event_name == 'schedule' || inputs.publish == 'true')
              run: |
                  NEW_VERSION="${{ steps.diff.outputs.new-version }}"
                  for pkg in mex proto appstate xml wam; do
                      cd "packages/$pkg"
                      # --provenance generates a signed attestation tying this
                      # tarball to this exact workflow run; requires trusted
                      # publishing to be configured on the npm package page.
                      # --tag latest is required because our version string
                      # (e.g. 2.3000.1040073745-abc1234) is semver-prerelease
                      # due to the SHA suffix; npm otherwise refuses to assign
                      # the default dist-tag automatically.
                      npm publish --access public --provenance --tag latest \
                          || echo "::warning::failed to publish @vinikjkkj/wa-$pkg"
                      cd ../..
                  done
                  git tag "v${NEW_VERSION}" || true
                  git push --tags || true
